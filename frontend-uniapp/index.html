<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Personal Blog</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="application-name" content="Personal Blog" />
    <meta name="description" content="技术笔记 · Unity / OpenGL / 计算机基础" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
    <!-- Cloudflare Web Analytics (F6 / SPEC §13.7 P2):
         Owner activation: Cloudflare dashboard -> Web Analytics ->
         Add a site -> multilab.cc -> copy the token, then replace
         <CF_ANALYTICS_TOKEN> below with it. The inline guard
         short-circuits while the placeholder is still present, so
         this snippet is safe to commit and safe to ship to dev. -->
    <script>
      (function () {
        var token = '<CF_ANALYTICS_TOKEN>'
        if (token.indexOf('<CF_') === 0) return
        var s = document.createElement('script')
        s.defer = true
        s.src = 'https://static.cloudflareinsights.com/beacon.min.js'
        s.setAttribute('data-cf-beacon', JSON.stringify({ token: token }))
        document.head.appendChild(s)
      })()
    </script>
  </body>
</html>
